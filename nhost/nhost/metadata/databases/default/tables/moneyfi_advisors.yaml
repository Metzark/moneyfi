        - persona
        - updated_at
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - elevenlabs_voice_id
        - image_url
        - name
        - id
        - description
        - full_bio
        - persona
        - created_at
        - updated_at
      filter: {}
    comment: ""
