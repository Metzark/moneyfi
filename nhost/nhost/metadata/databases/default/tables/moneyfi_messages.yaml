table:
  name: messages
  schema: moneyfi
object_relationships:
  - name: advisor
    using:
      foreign_key_constraint_on: advisor_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - advisor_id
        - audio_url
        - from_user
        - message
        - user_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - advisor_id
        - audio_url
        - created_at
        - from_user
        - id
        - message
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
